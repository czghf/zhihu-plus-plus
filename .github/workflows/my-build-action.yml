on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      args:
        required: false
        type: string
      minify:
        required: false
        type: boolean
      release:
        required: false
        type: boolean
      nightly_release:
        required: false
        type: boolean
    secrets:
      ANDROID_SIGNING_KEY:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set current date as env variable
        run: echo "date_today=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
      - name: Set repository name as env variable
        run: echo "repository_name=$(echo '${{ github.repository }}' | awk -F '/' '{print $2}')" >> $GITHUB_ENV

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          override: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk || true

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Generate New Keystore
        run: |
          rm -f app/zhihu.jks
          keytool -genkey -v \
            -keystore app/zhihu.jks \
            -alias zhihu \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=ZhiHu Plus Plus, OU=Dev, O=ZhiHu, L=Beijing, ST=Beijing, C=CN"

      - name: Cache Rust
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ./rs-hf-tokenizer/target/
            ./apk-recompress/target/
          key: rust-cache-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            rust-cache-
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.m2/repository
            ./.gradle
            ./**/.gradle
          key: gradle-cache-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Android NDK
        run: |
          echo "y" | sdkmanager --install "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV
      - name: Run KtLint
        run: ./gradlew ktlintCheck
      - name: Build App
        run: |
          bash ./gradlew ${{inputs.args}} assembleFullRelease
          bash ./gradlew ${{inputs.args}} assembleLiteRelease
        env:
          CI_BUILD_MINIFY: ${{ inputs.minify }}
      - name: Move files
        run: |
          mkdir -p app/build/upload
          mv app/build/outputs/apk/full/release/app-full-release.apk app/build/upload/zhihu++-full.apk
          mv app/build/outputs/apk/lite/release/app-lite-release.apk app/build/upload/zhihu++-lite.apk

      - name: Compress lite mapping file
        if: ${{ inputs.minify }}
        run: |
          mkdir -p app/build/upload
          zip app/build/upload/mapping-lite.zip app/build/outputs/mapping/liteRelease/mapping.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.date_today }} - ${{ env.repository_name }} - ${{ inputs.name }}
          path: app/build/upload/
